<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Deploy</title>
<style>body{font-family:system-ui;background:#0b0d12;color:#e2e8f0;padding:40px;text-align:center}
h1{color:#22c55e;font-size:48px}.check{padding:10px;margin:10px 0;background:#191d27;border-radius:8px;display:inline-block;min-width:400px;text-align:left}
.ok{color:#22c55e}.fail{color:#ef4444}</style></head>
<body>
<h1>✅ DEPLOY OK</h1>
<p>Si ves esto, Netlify está sirviendo correctamente.</p>
<div id="results"></div>
<script>
const tests=['icon-16.png','icon-32.png','icon-64.png','color.png','outline.png','index.html'];
const r=document.getElementById('results');
tests.forEach(t=>{
  fetch(t,{method:'HEAD'}).then(res=>{
    const d=document.createElement('div');d.className='check';
    d.innerHTML=(res.ok?'<span class="ok">✅</span>':'<span class="fail">❌</span>')+' '+t+' → HTTP '+res.status;
    r.appendChild(d);
  }).catch(e=>{
    const d=document.createElement('div');d.className='check';
    d.innerHTML='<span class="fail">❌</span> '+t+' → '+e.message;
    r.appendChild(d);
  });
});
</script></body></html>
